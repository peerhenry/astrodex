version: "3.8"

services:
  database:
    image: postgis/postgis:16-3.4-alpine
    container_name: astrodex_local_db
    environment:
      POSTGRES_USER: astrodex_admin
      POSTGRES_PASSWORD: local_secure_password_123
      POSTGRES_DB: astrodex
    volumes:
      - astrodex_local_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Exposed so you can inspect coordinates with DBeaver/TablePlus
    networks:
      - astrodex_local_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrodex_admin -d astrodex"]
      interval: 5s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.1 # Match your cloud service version
    container_name: astrodex_local_api
    ports:
      - "8055:8055"
    environment:
      KEY: "local-random-session-secret-key"
      SECRET: "local-random-jwt-secret-string"

      # Database Link
      DB_CLIENT: "pg"
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_DATABASE: "astrodex"
      DB_USER: "astrodex_admin"
      DB_PASSWORD: "local_secure_password_123"

      # Initial Admin Setup
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "admin123"

      # Telemetry & Storage Defaults
      TELEMETRY: "false"
      STORAGE_LOCATIONS: "local"

      # Explicitly allow Nuxt 3 to communicate with the Directus API from the browser
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:3000"
      CORS_CREDENTIALS: "true"

      # Relax cookie flags for local testing without HTTPS
      REFRESH_TOKEN_COOKIE_SECURE: "false"
      REFRESH_TOKEN_COOKIE_SAME_SITE: "lax"

      # Keeps Directus clean from internal PostGIS spatial tracking data tables
      DB_EXCLUDE_TABLES: "spatial_ref_sys"

    depends_on:
      database:
        condition: service_healthy
    networks:
      - astrodex_local_net

networks:
  astrodex_local_net:
    driver: bridge

volumes:
  astrodex_local_pgdata:
