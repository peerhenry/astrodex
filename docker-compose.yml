version: "3.9"

services:
  database:
    image: postgis/postgis:16-3.4-alpine
    container_name: astrodex-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      POSTGRES_DB: directus
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "directus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  directus:
    image: directus/directus:11.0.0
    container_name: astrodex-directus
    restart: unless-stopped
    ports:
      - "${DIRECTUS_PORT:-8055}:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    depends_on:
      database:
        condition: service_healthy
    environment:
      KEY: "${DIRECTUS_KEY:-local-random-session-secret-key}"
      SECRET: ${DIRECTUS_SECRET:-super-insecure-local-secret-change-in-prod}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}

      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus}

      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@local}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-localpassword}

      TELEMETRY: ${DIRECTUS_TELEMETRY:-false}
      STORAGE_LOCATIONS: "local"

      REFRESH_TOKEN_COOKIE_SECURE: ${DIRECTUS_REFRESH_TOKEN_COOKIE_SECURE:-false}
      REFRESH_TOKEN_COOKIE_SAME_SITE: ${DIRECTUS_REFRESH_TOKEN_COOKIE_SAME_SITE:-lax}

      DB_EXCLUDE_TABLES: "spatial_ref_sys"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: astrodex-nuxt
    restart: unless-stopped
    ports:
      - "${NUXT_PORT:-3000}:3000"
    depends_on:
      - directus
    environment:
      NUXT_PUBLIC_DIRECTUS_URL: ${NUXT_PUBLIC_DIRECTUS_URL:-http://localhost:8055}
      NUXT_DIRECTUS_ADMIN_TOKEN: ${NUXT_DIRECTUS_ADMIN_TOKEN}

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
